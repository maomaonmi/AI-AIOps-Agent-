model:
  base_model: "Qwen/Qwen-7B-Chat"
  trust_remote_code: true
  use_flash_attention: false

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./finetune/output"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  fp16: true
  gradient_checkpointing: true
  deepspeed: null
  seed: 42
  dataloader_num_workers: 4
  remove_unused_columns: false

data:
  train_file: "./data_gen/output/train_data.json"
  val_size: 0.1
  max_source_length: 512
  max_target_length: 512
  prompt_template: "### Instruction:\n{instruction}\n\n### Input:\n{input}\n\n### Response:\n{output}"

merge:
  output_dir: "./finetune/merged"
